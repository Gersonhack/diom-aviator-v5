<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESPORTIVABET • Análise Avançada DIOM AVIATOR</title>
        <meta property="og:title" content="CALCULADORA AVANÇADA • DIOM AVIATOR">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/calculadoradiom/index.css">

    <link rel="stylesheet" href="/calculadoradiom/login.css">
    <!-- Firebase SDK (compat) -->
<!-- Firebase SDK (compat) - ordem IMPORTANTE: app primeiro, depois auth, depois database -->
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
</head>
<body>
    <div class="cosmic-bg"></div>
    <div class="grid-overlay"></div>
    <div class="floating-particles" id="particles"></div>
    
    <!-- Modal de Login -->
<div class="auth-overlay" id="authOverlay">
  <div class="auth-modal">
    <h2>🔐 DIOM AVIATOR</h2>
    <p>Faça login para usar a calculadora</p>
    <input type="email" id="loginEmail" class="auth-input" placeholder="E-mail" autocomplete="off">
    <input type="password" id="loginPassword" class="auth-input" placeholder="Senha">
    <div class="auth-error" id="authError">E-mail ou senha inválidos</div>
    <button class="auth-btn" id="loginButton">ENTRAR</button>
    <a href="https://wa.me/27999876397?text=Quero%20acesso%20%C3%A0%20calculadora%20DIOM%20Aviator" target="_blank" class="auth-link">
      💰 COMPRAR ACESSO
    </a>
  </div>
</div>

<!-- Botão de logout (opcional, aparece quando logado) -->
<button class="logout-btn" id="logoutBtn" style="display: none;">SAIR</button>

    
    
    <div class="main-container">
        <!-- Header com logo redonda -->
        <div class="header-section">
            <div class="logo-container">
                <div class="logo-circle">
                    <!-- Substitua a src pela sua imagem de logo -->
                    <img src="/src/assents/imgs/Logo-2.jpg" alt="ESPORTIVABET Logo">
                    <!-- Ou use SVG:
                    <svg viewBox="0 0 24 24" fill="white">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/>
                    </svg>
                    -->
                </div>
                <div class="brand-name">
                    <span class="brand-name-esportiva">ESPORTIVA</span>
                    <span class="brand-name-bet">BET</span>
                </div>
                <div class="brand-tagline">ANÁLISE AVANÇADA</div>
                <span class="brand-name-bet">SPRIBE</span>
            </div>
        </div>
        
        <!-- Card principal sem bordas -->
        <div class="analysis-card">
            <div class="input-section">
                <div class="input-header">
                    <span class="input-title">DADOS DA RODADA</span>
                    <button class="example-button" onclick="loadExample()">EXEMPLO</button>
                </div>
                <textarea class="data-input" id="input" placeholder="3968320 4.55x 12:23:09"></textarea>
            </div>
            
            <div class="action-buttons">
                <button class="btn-primary" onclick="processData()">PROCESSAR</button>
                <button class="btn-secondary" onclick="clearData()">LIMPAR</button>
            </div>
            
            <div class="loading-indicator" id="loading">
                <div class="spinner"></div>
                <div style="color: var(--primary); font-size: 14px;">PROCESSANDO...</div>
            </div>
            
            <div class="results-area" id="out">
                <!-- Resultados ESPORTIVABET-->
            </div>
            
            <div class="system-warning">
                Sistema de análise avançada • Use com responsabilidade
            </div>
            
            <div class="footer-note">
                © 2026 TODOS DIREITOS RESERVADOS DIOM AVIATOR • ESPORTIVABET
            </div>
        </div>
    </div>

    <script src="/calculadoradiom/index.js">

    </script>
    <script type="text/javascript" charset="utf-8" src="/calculadoradiom/auth.js">
        
    </script>
</body>
</html>
