<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin • DIOM Aviator</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Firebase SDK compat -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Orbitron', 'Exo 2', sans-serif;
            background: #0a0a0c;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .admin-container {
            width: 100%;
            max-width: 900px;
            background: #121214;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,122,0,0.2);
        }
        h1 {
            color: #ff7a00;
            font-size: 28px;
            margin-bottom: 10px;
            text-align: center;
        }
        .subtitle {
            text-align: center;
            color: #a0a0a0;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .login-section, .admin-section {
            display: none;
        }
        .login-section.active, .admin-section.active {
            display: block;
        }
        .login-card {
            background: #1a1a1e;
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            margin: 0 auto;
            border: 1px solid rgba(255,122,0,0.3);
        }
        .login-card h2 {
            color: #ff7a00;
            margin-bottom: 20px;
            font-size: 22px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #ff7a00;
            font-size: 14px;
        }
        .input-group input {
            width: 100%;
            padding: 15px;
            background: #222;
            border: 1px solid rgba(255,122,0,0.3);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            outline: none;
        }
        .input-group input:focus {
            border-color: #ff7a00;
            box-shadow: 0 0 15px rgba(255,122,0,0.3);
        }
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #ff7a00, #cc6200);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255,122,0,0.4);
        }
        .error-msg {
            color: #ff4444;
            margin-top: 10px;
            text-align: center;
            display: none;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .admin-header h2 {
            color: #ff7a00;
            font-size: 24px;
        }
        .logout-btn {
            background: transparent;
            border: 1px solid rgba(255,122,0,0.5);
            color: #ff7a00;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
        }
        .logout-btn:hover {
            background: rgba(255,122,0,0.2);
        }
        .add-user {
            background: #1a1a1e;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,122,0,0.2);
        }
        .add-user h3 {
            color: #ff7a00;
            margin-bottom: 15px;
        }
        .form-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .form-row .input-group {
            flex: 1;
            min-width: 200px;
        }
        .btn-small {
            padding: 12px 25px;
            background: #ff7a00;
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            align-self: flex-end;
            margin-bottom: 20px;
        }
        .btn-small:hover {
            background: #cc6200;
        }
        .filter-section {
            margin-bottom: 20px;
        }
        .filter-section input {
            width: 100%;
            padding: 12px;
            background: #222;
            border: 1px solid rgba(255,122,0,0.3);
            border-radius: 12px;
            color: white;
            font-size: 14px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #1a1a1e;
            border-radius: 15px;
            overflow: hidden;
        }
        th {
            background: #ff7a00;
            color: #000;
            padding: 12px;
            font-weight: 700;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid rgba(255,122,0,0.2);
            color: #fff;
        }
        .profile-badge {
            width: 40px;
            height: 40px;
            background: #ff7a00;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 20px;
            color: #000;
            text-transform: uppercase;
        }
        .remove-btn {
            background: none;
            border: 1px solid #ff4444;
            color: #ff4444;
            padding: 5px 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        .remove-btn:hover {
            background: #ff4444;
            color: white;
        }
        .no-users {
            text-align: center;
            padding: 20px;
            color: #a0a0a0;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <h1>⚡ DIOM CALC ADMIN</h1>
        <div class="subtitle">Painel de controle • Gerenciar usuários</div>

        <!-- Seção de Login -->
        <div class="login-section active" id="loginSection">
            <div class="login-card">
                <h2>🔐 Login Administrador</h2>
                <div class="input-group">
                    <label>E-mail</label>
                    <input type="email" id="adminEmail" placeholder="admin@email.com">
                </div>
                <div class="input-group">
                    <label>Senha</label>
                    <input type="password" id="adminPassword" placeholder="••••••••">
                </div>
                <button class="btn" id="adminLoginBtn">ENTRAR</button>
                <div class="error-msg" id="loginError"></div>
            </div>
        </div>

        <!-- Seção do Painel (visível após login) -->
        <div class="admin-section" id="adminSection">
            <div class="admin-header">
                <h2>👥 Gerenciar Usuários</h2>
                <button class="logout-btn" id="logoutBtn">SAIR</button>
            </div>

            <!-- Formulário para adicionar novo usuário -->
            <div class="add-user">
                <h3>➕ Adicionar Novo Acesso</h3>
                <div class="form-row">
                    <div class="input-group">
                        <label>E-mail</label>
                        <input type="email" id="newEmail" placeholder="usuario@email.com">
                    </div>
                    <div class="input-group">
                        <label>Senha</label>
                        <input type="password" id="newPassword" placeholder="senha">
                    </div>
                    <button class="btn-small" id="addUserBtn">ADICIONAR</button>
                </div>
                <div class="error-msg" id="addError" style="margin-top:10px;"></div>
            </div>

            <!-- Filtro -->
            <div class="filter-section">
                <input type="text" id="filterInput" placeholder="🔍 Filtrar por e-mail...">
            </div>

            <!-- Tabela de usuários -->
            <div style="overflow-x: auto;">
                <table id="usersTable">
                    <thead>
                        <tr>
                            <th>Perfil</th>
                            <th>E-mail</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <tr><td colspan="3" class="no-users">Nenhum usuário cadastrado.</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyB5v0e77dvzHINhHzCKeMs6QPjqo7Z7img",
            authDomain: "login-database-black.firebaseapp.com",
            projectId: "login-database-black",
            storageBucket: "login-database-black.appspot.com",
            messagingSenderId: "768021690283",
            appId: "1:768021690283:web:221e866026541faffa04ee",
            databaseURL: "https://login-database-black-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        const usersRef = db.ref('users');

        // Elementos
        const loginSection = document.getElementById('loginSection');
        const adminSection = document.getElementById('adminSection');
        const adminEmail = document.getElementById('adminEmail');
        const adminPassword = document.getElementById('adminPassword');
        const adminLoginBtn = document.getElementById('adminLoginBtn');
        const loginError = document.getElementById('loginError');
        const logoutBtn = document.getElementById('logoutBtn');
        const newEmail = document.getElementById('newEmail');
        const newPassword = document.getElementById('newPassword');
        const addUserBtn = document.getElementById('addUserBtn');
        const addError = document.getElementById('addError');
        const filterInput = document.getElementById('filterInput');
        const tableBody = document.getElementById('usersTableBody');

        // Verificar estado de autenticação do admin
        auth.onAuthStateChanged(user => {
            if (user) {
                // Admin logado
                loginSection.classList.remove('active');
                adminSection.classList.add('active');
                loadUsers(); // Carrega lista de usuários
            } else {
                loginSection.classList.add('active');
                adminSection.classList.remove('active');
            }
        });

        // Login do admin
        adminLoginBtn.addEventListener('click', () => {
            const email = adminEmail.value.trim();
            const password = adminPassword.value;
            if (!email || !password) {
                loginError.style.display = 'block';
                loginError.textContent = 'Preencha todos os campos';
                return;
            }
            auth.signInWithEmailAndPassword(email, password)
                .then(() => {
                    loginError.style.display = 'none';
                    adminEmail.value = '';
                    adminPassword.value = '';
                })
                .catch(err => {
                    loginError.style.display = 'block';
                    loginError.textContent = err.message;
                });
        });

        // Logout
        logoutBtn.addEventListener('click', () => {
            auth.signOut();
        });

        // Função para carregar usuários do RTDB
        function loadUsers() {
            usersRef.on('value', snapshot => {
                const users = snapshot.val();
                renderUsers(users);
            });
        }

        // Renderizar tabela
        function renderUsers(users) {
            if (!users) {
                tableBody.innerHTML = '<tr><td colspan="3" class="no-users">Nenhum usuário cadastrado.</td></tr>';
                return;
            }

            // Converter objeto em array
            const usersArray = Object.entries(users).map(([id, data]) => ({ id, ...data }));

            // Filtrar se houver texto no filtro
            const filterText = filterInput.value.toLowerCase();
            const filtered = filterText ? usersArray.filter(u => u.email.toLowerCase().includes(filterText)) : usersArray;

            if (filtered.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="3" class="no-users">Nenhum usuário encontrado.</td></tr>';
                return;
            }

            let html = '';
            filtered.forEach(user => {
                // Extrair inicial do email (primeira letra do nome antes do @)
                const emailParts = user.email.split('@');
                const namePart = emailParts[0] || '';
                const initial = namePart.charAt(0).toUpperCase() || '?';

                html += `
                    <tr>
                        <td><div class="profile-badge">${initial}</div></td>
                        <td>${user.email}</td>
                        <td><button class="remove-btn" data-id="${user.id}">REMOVER</button></td>
                    </tr>
                `;
            });
            tableBody.innerHTML = html;

            // Adicionar eventos aos botões de remover
            document.querySelectorAll('.remove-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = e.target.getAttribute('data-id');
                    if (confirm('Tem certeza que deseja remover este usuário?')) {
                        usersRef.child(id).remove()
                            .then(() => {
                                // Atualização automática via snapshot
                            })
                            .catch(err => alert('Erro ao remover: ' + err.message));
                    }
                });
            });
        }

        // Adicionar novo usuário
        addUserBtn.addEventListener('click', () => {
            const email = newEmail.value.trim();
            const password = newPassword.value.trim();

            if (!email || !password) {
                addError.style.display = 'block';
                addError.textContent = 'Preencha todos os campos';
                return;
            }

            // Validação simples de email
            if (!email.includes('@') || !email.includes('.')) {
                addError.style.display = 'block';
                addError.textContent = 'E-mail inválido';
                return;
            }

            // Gerar um novo ID (push)
            const newUserRef = usersRef.push();
            newUserRef.set({
                email: email,
                password: password // ATENÇÃO: Em produção, NUNCA armazene senhas em texto claro! Use hash.
            }).then(() => {
                newEmail.value = '';
                newPassword.value = '';
                addError.style.display = 'none';
            }).catch(err => {
                addError.style.display = 'block';
                addError.textContent = err.message;
            });
        });

        // Filtro em tempo real
        filterInput.addEventListener('input', () => {
            usersRef.once('value', snapshot => {
                renderUsers(snapshot.val());
            });
        });
    </script>
</body>
</html>
